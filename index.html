
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tamirul Millat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-gradient-custom {
            background: linear-gradient(135deg, #026670 0%, #D4F3C8 100%);
        }

        .shadow-custom {
            box-shadow: 0 25px 50px -12px rgba(2, 102, 112, 0.35); /* using #026670 shade */
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-custom flex  items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-6xl mx-auto animate-fade-in">
    <div class="bg-white rounded-3xl shadow-custom overflow-hidden">
        <div class="flex flex-col lg:flex-row flex-col-reverse">
            <!-- Left Side - Images and Branding -->
            <div class="lg:w-1/2 bg-gradient-to-br from-[#026670] to-[#D4F3C8] flex">
    <!-- School Building Image -->
    <div class="w-full h-full">
        <div class="overflow-hidden shadow-lg h-full">
            <img src="https://www.tmt.edu.bd/images/tm/madrasah.jpg" 
                 alt="School Building" 
                 class="w-full h-full object-cover">
        </div>
    </div>
</div>


            <!-- Right Side - Login Form -->
            <div class="lg:w-1/2 p-8 lg:p-12 flex items-center justify-center">
                <div class="w-full max-w-md">
                    
                    <div class="mb-2 text-center">
                    <div class="w-24 h-24 mx-auto mb-4 bg-white rounded-full p-4 shadow-lg">
                        <img src="https://www.tmt.edu.bd/images/tm/tmkm-logo.jpg" alt="School Logo" class="w-full h-full object-contain">
                    </div>
                    <div class="mt-4 mb-8 text-center">
                        <h1 class="text-xl md:text-2xl font-bold text-[#026670] mb-2">
                        Tamirul Millat Kamil Madrasah</h1>
                        <p class="text-gray-600">Tongi, Gazipur-1712</p>
                    </div>
                        </div>
                
                    

                    <!-- Login Form -->
                    <form id="loginForm" action="https://www.eximusedu.com/login" class="space-y-6" method="POST">
                        <!-- Email Field -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                                User ID
                            </label>
                            <div class="relative">
                                <input
                                    type="text"
                                    id="email"
                                    name="email"
                                    required
                                    class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#026670] focus:border-transparent transition duration-200 outline-none"
                                    placeholder="Enter your ID"
                                    value="tmkmt-"
                                >
                                <svg class="absolute left-3 top-3 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                                </svg>
                            </div>
                        </div>

                        <!-- Password Field -->
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                                Password
                            </label>
                            <div class="relative">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    required
                                    class="w-full px-4 py-3 pl-10 pr-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#026670] focus:border-transparent transition duration-200 outline-none"
                                    placeholder="Enter your password"
                                >
                                <svg class="absolute left-3 top-3 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                                <button type="button" id="togglePassword" class="absolute right-3 top-3 h-5 w-5 text-gray-400 hover:text-gray-600">
                                    <svg id="eyeIcon" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Remember Me & Forgot Password -->
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input
                                    id="remember"
                                    type="checkbox"
                                    class="h-4 w-4 text-[#026670] focus:ring-[#026670] border-gray-300 rounded"
                                >
                                <label for="remember" class="ml-2 block text-sm text-gray-700">
                                    Remember me
                                </label>
                            </div>
                            <a href="https://www.eximusedu.com/password/reset?institute=tmkmt" class="text-sm text-[#026670] hover:text-[#014d52] transition duration-200">
                                Forgot password?
                            </a>
                        </div>

                        <!-- Login Button -->
                        <button
                            type="submit"
                            class="w-full bg-gradient-to-r from-[#026670] to-[#D4F3C8] text-white py-3 px-4 rounded-lg hover:from-[#014d52] hover:to-[#bdebb0] focus:ring-4 focus:ring-[#D4F3C8]/50 transition duration-200 font-medium shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                            id="loginBtn"
                        >
                            <span id="loginText">Sign In</span>
                            <svg id="loadingSpinner" class="hidden animate-spin -mr-1 ml-3 h-5 w-5 text-white inline" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>


                        <!-- Error Message -->
                        
                        <!-- Success Message -->
                        <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm">
                            <div class="flex items-center">
                                <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                                </svg>
                                <span id="successText">Login successful! Redirecting...</span>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    
    
    // Function to read query params
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    document.addEventListener("DOMContentLoaded", function () {
        const error = getQueryParam("error");
        if (error === "invalid") {
            const errorMessage = document.getElementById("errorMessage");
            if (errorMessage) {
                errorMessage.classList.remove("hidden");
            }
        }
        else if (error === "terminated") {
            const errorMessage = document.getElementById("errorMessage");
            if (errorMessage) {
                errorMessage.classList.remove("hidden");
            }
        }
    });
    
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L8.464 8.464m1.414 1.414L8.464 8.464M9.878 9.878l4.242-4.242m0 0L12.536 7.22m1.584 -1.584l2.122 2.122" />
                `;
        } else {
            passwordInput.type = 'password';
            eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
        }
    });

    
    document.getElementById('loginBtn').addEventListener('click', function() {
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            loginText.textContent = 'Signing in...';
            loadingSpinner.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

    });

    const inputs = document.querySelectorAll('input[type="email"], input[type="password"]');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.classList.add('ring-2', 'ring-blue-500');
        });

        input.addEventListener('blur', function() {
            this.parentElement.classList.remove('ring-2', 'ring-blue-500');
        });
    });

</script>
</body>
</html>
